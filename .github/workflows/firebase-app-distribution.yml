name: Firebase App Distribution

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: firebase-dist-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  distribute:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Bump Android version code
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          FILE="app/build.gradle.kts"
          CURRENT="$(sed -n 's/^[[:space:]]*versionCode[[:space:]]*=[[:space:]]*\([0-9]\+\).*/\1/p' "$FILE" | head -n 1)"
          if [ -z "$CURRENT" ]; then
            echo "versionCode not found in $FILE"
            exit 1
          fi

          NEXT="$((CURRENT + 1))"
          NEXT="$NEXT" perl -0pi -e 's/(versionCode\s*=\s*)\d+/${1}$ENV{NEXT}/' "$FILE"

          if git diff --quiet; then
            echo "No versionCode change detected; skipping commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git add "$FILE"
          git commit -m "chore: bump android versionCode to $NEXT"
          git push origin HEAD:master

      - name: Build APK
        run: ./gradlew --no-daemon :app:assembleDebug

      - name: Find APK
        id: apk
        shell: bash
        run: |
          set -euo pipefail
          shopt -s globstar nullglob
          apks=(app/build/outputs/apk/**/*.apk)
          if [ "${#apks[@]}" -eq 0 ]; then
            echo "No APK found under app/build/outputs/apk"
            exit 1
          fi

          APK="${apks[0]}"
          echo "path=$APK" >> "$GITHUB_OUTPUT"
          echo "Using APK: $APK"

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          file: ${{ steps.apk.outputs.path }}
          groups: ${{ secrets.FIREBASE_TESTER_GROUPS }}
          releaseNotes: |
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Actor: ${{ github.actor }}
            Message: ${{ github.event.head_commit.message }}
